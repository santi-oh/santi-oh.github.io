<style>
table, th, td {
  border: 0px;
  font-family:'Jost';
  font-weight: 100;
  color:white;

a {
    color:white; font-size:20px; text-decoration: none; font-weight: 300;
}

.container {
  position: relative;
  width: 100%;
}
.image {
  width: 100%;
  height: auto;
}
.imageLink {
  width: 100%;
  height: auto;
}
.overlay {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100%;
  width: 100%;
  opacity: 0;
  transition: .5s ease;
  background-color: #222255;
}
.container:hover .overlay {
  opacity: .8;
}
.text {
  color: white;
  font-family:'Jost';
  font-weight: 400;
  font-size: 5.25vw;
  position: absolute;
  top: 50%;
  left: 50%;
  -webkit-transform: translate(-50%, -50%);
  -ms-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%);
  text-align: center;
}

/* Three image containers (use 25% for four, and 50% for two, etc) */
.column {
  float: left;
  width: 49.0%;
  padding: 4px;
}
/* Three image containers (use 25% for four, and 50% for two, etc) */
.column1 {
  width: 98.4%;
  padding: 4px;
}
/* Clear floats after image containers */
.row::after {
  content: "";
  clear: both;
  display: table;
}
