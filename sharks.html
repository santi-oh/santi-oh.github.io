.overlay {

  transition: .5s ease;

.text {

}

.row::after {

.sheet-container {
  text-align: center;
  background-color: #222255; /* Matches your sheet and body */
  width: 100%;
  overflow: hidden;
}  

  /* This container forces the iframe to be 100% wide on mobile */
  .sheet-wrapper {
    position: relative;
    width: 95%;
    /* Adjust this percentage to fit your total number of rows.

    padding-bottom: 100%; 
       margin: 0 auto;
    height: 0;
    overflow: hidden;
    background-color: #222255;
    text-align: center;
  }

  .sheet-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
